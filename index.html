<div id="form-view">
        <div class="field">
          <label for="f-tipo">O que você deseja fazer?</label>
          <select id="f-tipo">
            <option value="edit">Atualizar dados de uma unidade existente</option>
            <option value="add">Adicionar uma nova unidade</option>
            <option value="del">Sugerir a exclusão de uma unidade</option>
          </select>
        </div>

        <div class="field" id="box-inst">
          <label for="f-inst">Instituição Atual</label>
          <select id="f-inst"><option value="">— selecione —</option></select>
        </div>
        
        <div class="field" id="box-eixo" style="display:none">
          <label for="f-eixo">Eixo (Categoria)</label>
          <select id="f-eixo">
            <option value="social">Assistência Social</option>
            <option value="saude">Saúde</option>
            <option value="edu">Educação</option>
            <option value="ct">Conselho Tutelar</option>
            <option value="just">Sistema de Justiça</option>
          </select>
        </div>

        <div id="box-campos-dados">
          <div class="field">
            <label for="f-nome-inst">Nome da Instituição</label>
            <input id="f-nome-inst" type="text" autocomplete="off" placeholder="Nome correto/novo da unidade">
          </div>
          <div class="field">
            <label for="f-endereco">Endereço</label>
            <input id="f-endereco" type="text" autocomplete="off" placeholder="Rua, número, bairro">
          </div>
          <div class="field-row">
            <div class="field">
              <label for="f-telefone">Telefone</label>
              <input id="f-telefone" type="text" inputmode="tel" placeholder="(49) 0000-0000">
            </div>
            <div class="field">
              <label for="f-whatsapp">WhatsApp</label>
              <input id="f-whatsapp" type="text" inputmode="tel" placeholder="(49) 00000-0000">
            </div>
          </div>
          <div class="field">
            <label for="f-email">E-mail</label>
            <input id="f-email" type="email" autocomplete="off" placeholder="nome@saojoaquim.sc.gov.br">
          </div>
          <div class="field">
            <label for="f-foto">Foto da Unidade (Opcional)</label>
            <input id="f-foto" type="file" accept="image/*" style="background:#f4ecdd; border:1px dashed #d8cab2">
          </div>
        </div>

        <div class="field">
          <label for="f-obs">Observação / Motivo</label>
          <textarea id="f-obs" placeholder="Detalhes adicionais ou motivo da exclusão..."></textarea>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="f-nome">Seu nome</label>
            <input id="f-nome" type="text" autocomplete="name" placeholder="Opcional">
          </div>
          <div class="field">
            <label for="f-contato">Seu contato</label>
            <input id="f-contato" type="text" autocomplete="off" placeholder="Telefone ou e-mail (opcional)">
          </div>
        </div>
        <p class="hintline" style="margin-bottom:10px">Seu nome e contato ajudam a confirmar a informação, se necessário.</p>

        <button class="btn-primary" id="f-enviar" type="button">Enviar formulário</button>
        <div class="form-msg" id="form-msg"></div>
      </div>
